<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock Analyze</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #182026;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.2;
        margin: 0 0 20px;
        letter-spacing: 0;
      }

      form {
        display: grid;
        gap: 12px;
      }

      textarea,
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bac4c9;
        border-radius: 6px;
        padding: 12px;
        font: inherit;
        background: #ffffff;
        color: #182026;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 6px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 650;
        background: #1b6b5f;
        color: #ffffff;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      pre {
        min-height: 220px;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #cdd5d8;
        border-radius: 6px;
        padding: 16px;
        background: #ffffff;
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
      }

      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111719;
          color: #edf2f3;
        }

        textarea,
        input,
        pre {
          background: #182124;
          color: #edf2f3;
          border-color: #344247;
        }

        button {
          background: #27a28e;
          color: #06110f;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stock Analyze</h1>
      <form id="form">
        <textarea id="prompt" placeholder="输入要发送给 Codex 的提示词"></textarea>
        <input id="skillName" placeholder="可选 skill 名称，例如 stock-reverse-engineering">
        <input id="skillPath" placeholder="可选 skill 路径，例如 C:\Users\<你>\.codex\skills\stock-reverse-engineering\SKILL.md">
        <div class="row">
          <input id="token" type="password" placeholder="可选 Bearer token">
          <button id="send" type="submit">Send</button>
        </div>
      </form>
      <pre id="output">等待输入...</pre>
    </main>

    <script>
      const form = document.querySelector("#form");
      const promptEl = document.querySelector("#prompt");
      const skillNameEl = document.querySelector("#skillName");
      const skillPathEl = document.querySelector("#skillPath");
      const tokenEl = document.querySelector("#token");
      const outputEl = document.querySelector("#output");
      const sendEl = document.querySelector("#send");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = promptEl.value.trim();
        if (!prompt) return;

        sendEl.disabled = true;
        outputEl.textContent = "Codex 正在处理...";

        try {
          const headers = { "Content-Type": "application/json" };
          const token = tokenEl.value.trim();
          if (token) headers.Authorization = `Bearer ${token}`;

          const response = await fetch("/api/codex", {
            method: "POST",
            headers,
            body: JSON.stringify({
              prompt,
              skillName: skillNameEl.value.trim(),
              skillPath: skillPathEl.value.trim()
            })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || `HTTP ${response.status}`);
          }

          outputEl.textContent = data.answer || "(Codex 没有返回文本)";
        } catch (error) {
          outputEl.textContent = `Error: ${error.message}`;
        } finally {
          sendEl.disabled = false;
        }
      });
    </script>
  </body>
</html>
